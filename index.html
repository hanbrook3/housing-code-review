/* 조례 DB 수록 현황: CITIES 선택 목록 대비 CITY_ORDINANCES 누락 자동 점검 */
function getOrdinanceCoverage(){
  const cityKeys=[];
  Object.entries(CITIES).forEach(([region,cities])=>{
    cities.forEach(city=>cityKeys.push(region+'|'+city));
  });
  const missing=cityKeys.filter(key=>!CITY_ORDINANCES[key]);
  return {
    regionCount:Object.keys(CITIES).length,
    cityCount:cityKeys.length,
    ordinanceKeyCount:Object.keys(CITY_ORDINANCES).length,
    missing,
    complete:missing.length===0
  };
}
const ORDINANCE_COVERAGE=getOrdinanceCoverage();

/* 적용 시점이 기준일 이후인지 (true: 신법 적용, false: 구법 적용) */
function isAfterDate(refDate){
  if(applyDate === 'latest') return true;
  return applyDate >= refDate.substring(0,7); // YYYY-MM 비교
}

function getCityOrd(region, city){
  if(city && city !== '(자동)'){
    const key1 = region + '|' + city;
    if(CITY_ORDINANCES[key1]) return {data:CITY_ORDINANCES[key1], key:key1, level:'city'};
  }
  if(CITY_ORDINANCES[region]) return {data:CITY_ORDINANCES[region], key:region, level:'region'};
  return null;
}

  if(cat.row) rows.push({n:'연립·다세대: '+cat.row, k:'row'});
  (cat.etc||'').split(' / ').forEach(function(s){s=s.trim(); if(s) rows.push({n:s, k:'etc'});});
  var KW={culture:['문화','집회'],sales:['판매'],lodge:['숙박'],biz:['업무'],medical:['의료','병원'],edu:['교육','연구'],welfare:['노유자','복지'],factory:['공장','창고'],offi:['업무'],nbr:['근린','판매']};
  var kws=KW[use]||[]; var anyEtc=false;
  rows.forEach(function(rw){
    if(dgKey==='apt') rw.m=(rw.k==='apt');
    else if(dgKey==='row') rw.m=(rw.k==='row');
    else { rw.m=(rw.k==='etc' && kws.some(function(k){return rw.n.indexOf(k)>=0;})); if(rw.m) anyEtc=true; }
  });
  if(dgKey==='etc' && !anyEtc){
    var done=false;
    for(var i=rows.length-1;i>=0;i--){ if(rows[i].k==='etc' && /그\s*밖/.test(rows[i].n)){rows[i].m=true;done=true;break;} }
    if(!done){ for(var j=rows.length-1;j>=0;j--){ if(rows[j].k==='etc'){rows[j].m=true;break;} } }
  }
  return rows.map(function(rw){return {n:rw.n,m:!!rw.m};});
}

    a({c:13,t:'공장 설립 승인 / 위험물 (산업집적법 등)',s:'V',
      th:'공장·창고시설',
      rq:'공장 설립 승인(산업집적법) / 위험물 저장·취급 시 위험물안전관리법 / 대기·수질 배출시설 신고',
      lg:['산업집적활성화 및 공장설립에 관한 법률 제13조','위험물안전관리법','대기환경보전법·물환경보전법'],
      nt:['<b>공장설립 승인</b>: 산업단지·계획입지/개별입지','<b>위험물</b>: 지정수량 이상 시 위험물시설 허가','<b>배출시설</b>: 대기·수질·소음 배출 신고','<b>창고</b>: 물류시설법 (물류창고업 등록 해당 시)']});
  }

  // ===== 용도 기반 필터링 =====
  // 비주거 용도: 주택건설기준(c:2) + 부대복리시설 중 주민공동시설(c:3) 제거
  let result = A;
  // 공동주택(주택건설기준·주택법) 전용 항목 — 비주거에서 제거 (용도 게이팅)
  const residOnlyC3=/주민공동시설|경로당|어린이놀이터|어린이집|작은도서관|주민운동시설|다함께돌봄|관리사무소|의무관리|제50조/;
  const residOnlyC5=/특정소방대상물 분류 \(공동주택\)|노유자시설 방염/;
  const residOnlyC6=/친환경주택|건강친화형|장수명|공동주택 성능등급/;
  if(isNonResid){
    result = A.filter(it=>{
      if(it.c===2) return false;                 // 주택건설기준 전체 제외
      if(it.c===3 && residOnlyC3.test(it.t||'')) return false;
      if(it.c===5 && residOnlyC5.test(it.t||'')) return false;
      if(it.c===6 && residOnlyC6.test(it.t||'')) return false;
      if(it.c===8) return false;                 // 발코니 대피공간 등 — 공동주택(아파트) 전용
      return true;
    });
  } else if(isOffi){
    // 오피스텔: 주택건설기준 중 준용 항목만 유지 (승강기·계단·복도·난간·CCTV·장애인)
    const offiKeepC2=/승강기|계단|복도|난간|출입문|영상정보처리기기|CCTV|장애인/;
    result = A.filter(it=>{
      if(it.c===2 && !offiKeepC2.test(it.t||'')) return false;
      if(it.c===3 && residOnlyC3.test(it.t||'')) return false;
      if(it.c===5 && residOnlyC5.test(it.t||'')) return false;
      if(it.c===6 && residOnlyC6.test(it.t||'')) return false;
      if(it.c===8) return false;
      return true;
    });
  }

  const grouped={};
  CATS.forEach((_,i)=>{grouped[i]=[];});
  result.forEach(item=>{if(grouped[item.c])grouped[item.c].push(item);});
  return {all:result, grouped};
}


/* ============================================================
   시·군 자동 적용 (지역 변경 시 계산기 산식 반영)
============================================================ */
function applyRegionDefaults(I){
  const key = I.r + '|' + (I.c||'');
  if(lastAppliedKey === key) return;
  lastAppliedKey = key;
  const ordRes = getCityOrd(I.r, I.c);
  const ord = ordRes ? ordRes.data : null;

  // 1. 법정 주차대수 비율 자동 적용 (preset 버튼 상태는 renderParkCalc에서 일괄 갱신)
  // 주차대수는 renderParkCalc가 지역(주택건설기준 제27조)·검증 조례 기준으로 산정

  // 2. 전기차 충전 비율 자동
  if(!userTouched.ptPct && ord){
    const evRow = parkTypes.find(p=>p.k==='ev');
    if(evRow) evRow.pct = ord.ev;
  }

  // 3. 도시교통정비지역 자동 판정
  if(!userTouched.trafficUrban){
    const isUrban = ord ? ord.urban : URBAN_DEFAULT_REGIONS.includes(I.r);
    trafficState.urban = isUrban ? 'y' : 'n';
    document.querySelectorAll('[data-tf="urban"]').forEach(b=>{
      b.classList.toggle('on', b.dataset.val === trafficState.urban);
    });
  }
}

  const reviews=all.filter(i=>i.c===10 && (i.s==='A'||i.s==='V')).map(i=>i.t.replace(' ⚠ 구법',''));
  // 영향평가 (c:7)
  const assess=all.filter(i=>i.c===7 && (i.s==='A'||i.s==='V')).map(i=>i.t.replace(' ⚠ 구법',''));
  // 인증 (c:6)
  const certs=all.filter(i=>i.c===6 && (i.s==='A'||i.s==='R')).map(i=>i.t.replace(' ⚠ 구법',''));
  // 핵심 수치 제한
  const zLimits=ZONE_LIMITS[I.z]||[0,0];
  const ordRes=getCityOrd(I.r,I.c);
  const evPct=ordRes?ordRes.data.ev:5;
  const limits=[
    `<b>건폐율</b> ${zLimits[0]}% 이하 · <b>용적률</b> ${zLimits[1]}% 이하 (법정 상한)`,
    I.f>=1?`<b>최고층수</b> ${I.f}층 — 일조·고도지구·지구단위계획 확인`:'',
    `<b>전기차 충전</b> 총 주차 ${evPct}% 이상`,
    (['zone1','zone2','zone3','zone4','zone5'].includes(I.z))?'<b>정북일조</b> 적용 (전용·일반주거지역)':'',
  ].filter(Boolean);

  const mk=(ico,icoBg,title,arr,accent)=>{
    const lis=arr.length?arr.slice(0,8).map(x=>`<li>${x}</li>`).join(''):'<li class="dash-empty">해당 항목 없음 (현재 입력 기준)</li>';
    return `<div class="dash-card" style="--accent:${accent}">
      <div class="dc-h"><span class="dc-ico" style="background:${icoBg}">${ico}</span><span class="dc-t">${title}</span><span class="dc-n">${arr.length}</span></div>
      <ul class="dash-list">${lis}</ul>
    </div>`;
  };
  dash.innerHTML=
    mk('📋','#fef2f2','필수 인허가 절차',permits,'var(--req)')+
    mk('⚖','#eef2ff','지자체 심의',reviews,'#4338ca')+
    mk('📊','#fff7ed','영향평가 / 사전검토',assess,'#c2410c')+
    mk('🏅','#ecfdf5','친환경·인증',certs,'var(--rec)')+
    mk('📐','#ecfeff','핵심 수치 제한',limits,'#0e7490');
}

/* ===== 심의·영향평가·사전검토 상세 (대상기준/대상여부) ===== */
/* 공용: 대상/검토/비대상 색상 결론 박스 (renderPermitDetail·STEP3 체크리스트 공용 — DRY) */
const PD_CONCL_W={A:'대상',V:'검토',N:'비대상',R:'권장'};
const PD_CONCL_I={A:'✔',V:'◐',N:'✗',R:'☆'};
function pdConcl(state,gist){return `<div class="pd-concl pd-c-${state}"><span class="cw">${PD_CONCL_I[state]||'•'} ${PD_CONCL_W[state]||'확인'}</span>${gist||''}</div>`;}

function renderPermitDetail(all, I){
  const box=document.getElementById('permitDetail');
  if(!box) return;
  const rows=all.filter(i=>i.c===7||i.c===10);
  if(!rows.length){ box.innerHTML='<div class="result-panel"><div class="dash-empty">현재 입력 기준 표시할 심의·영향평가 항목이 없습니다.</div></div>'; return; }
  const SL={A:['대상','req'],V:['검토','warn'],N:['비대상','na'],R:['권장','good']};
  const CAT={7:'영향평가 · 사전검토',10:'지자체 심의'};
  const VARMAP=[['교통영향평가','건축 연면적 · 용도 · 도시교통정비지역/교통권역'],['교육환경평가','층수 · 연면적 · 정비사업 · 교육환경보호구역(학교 200m)'],['소규모 환경영향평가','입지(용도지역) · 지구단위계획 · 사업부지(대지)면적'],['환경영향평가','사업부지(대지)면적 · 사업유형'],['소규모 지하안전','굴착깊이(10~20m)'],['지하안전평가','굴착깊이(20m 이상)'],['재해영향평가','사업부지(대지)면적 · 주택법 사업계획승인 · 재해위험지구'],['건축위원회','세대수 · 층수 · 사업방식'],['경관위원회','경관지구/중점경관관리구역 · 사업방식'],['건축구조','층수 · 연면적'],['굴토심의','굴착깊이'],['도시계획위원회','지구단위계획 · 도시계획시설 · 용도지역 변경'],['매장유산','사업부지(대지)면적 · 유존지역'],['정비사업','사업방식(재건축·재개발)']];
  const SRCWARN=['굴토심의','도시계획위원회'];
  const pickVar=t=>{const f=VARMAP.find(([k])=>t.indexOf(k)>=0);return f?f[1]:'';};
  let html='<div class="pd-legend"><span><i class="lg-a"></i>대상</span><span><i class="lg-v"></i>검토(조건부)</span><span><i class="lg-g"></i>비대상</span><span><i class="lg-y"></i>▶ 해당 기준(대상이 되는 근거)</span><span>※ 위치·계획 정보 필요 항목은 상단 「추가 입지·계획 정보」 선택 시 확정</span></div>'
    +'<div class="result-panel wide" style="padding:0;overflow-x:auto">'
    +'<table class="result-table review-matrix"><thead><tr>'
    +'<th style="width:152px">항목</th><th>대상기준 / 검토사항 (근거 법령)</th><th style="width:74px">대상여부</th>'
    +'</tr></thead><tbody>';
  [7,10].forEach(cat=>{
    const items=rows.filter(i=>i.c===cat);
    if(!items.length) return;
    html+=`<tr style="background:#eef2f6"><td colspan="3" style="font-weight:800;color:#111827">${CAT[cat]}</td></tr>`;
    items.forEach(it=>{
      const sl=SL[it.s]||['확인','na'];
      const title=String(it.t||'').replace(' ⚠ 구법','');
      const gistRaw=String(it.th||'').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
      const concl=pdConcl(it.s, gistRaw);
      const vlabel=pickVar(title);
      const varLine=vlabel?`<div class="pd-var">기준 변수: <b>${vlabel}</b></div>`:'';
      const isWarn=SRCWARN.some(k=>title.indexOf(k)>=0);
      const srcTag=`<span class="pd-src ${isWarn?'warn':'ok'}">${isWarn?'조례·지침 위임':'법제처 원문확인'}</span>`;
      const lg=(it.lg||[]).map(x=>`<span class="result-chip">${x}</span>`).join(' ');
      const hit=(it.s==='A'||it.s==='V')?(it.hit||''):'';
      let whyTxt='';
      const nt=(it.nt||[]).map(x=>{
        const on = hit && x.indexOf(hit)>=0;
        if(on && !whyTxt) whyTxt = x.replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/^\s*•\s*/,'').trim();
        return `<li${on?' class="pd-hit"':''}>${x}${on?' <span class="pd-hit-badge">▶ 우리 사업 해당</span>':''}</li>`;
      }).join('');
      html+='<tr>'
        +`<td class="focus">${title}${srcTag}</td>`
        +'<td>'+concl+varLine
        +(it.rq?`<div class="basis" style="margin-top:4px">${it.rq}</div>`:'')
        +(lg?`<div style="margin-top:6px"><span class="pd-lglbl">근거 법령(법제처)</span>${lg}</div>`:'')
        +(whyTxt?`<div class="pd-why">▶ 해당 기준: ${whyTxt}</div>`:'')
        +(nt?`<details style="margin-top:6px"><summary style="cursor:pointer;color:#3156a3;font-weight:700;font-size:10.5px">세부 기준 펼치기</summary><ul class="notes" style="margin-top:6px">${nt}</ul></details>`:'')
        +'</td>'
        +`<td><span class="result-chip ${sl[1]}">${sl[0]}</span></td>`
        +'</tr>';
    });
  });
  html+='</tbody></table></div>';
  box.innerHTML=html;
}

/* ===== 진행률(설계 반영 검토) 갱신 ===== */
function updateProgress(){
  const keys=window.__allDoneKeys||[];
  const total=keys.length;
  const done=keys.filter(k=>doneState[k]).length;
  const pct=total?Math.round(done/total*100):0;
  const fill=document.getElementById('progFill');
  const txt=document.getElementById('progText');
  if(fill) fill.style.width=pct+'%';
  if(txt) txt.textContent=`${done} / ${total}`;
}

function escHtml(v){
  return String(v).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function buildTopEditForm(){
  const wrap=document.getElementById('topEditForm');
  if(!wrap || wrap.dataset.ready) return;
  const fields=[
    ['광역시·도','tR','sR','select'],
    ['시·군·구','tC','sC','select'],
    ['용도지역','tZ','sZ','select'],
    ['건축물 용도','tB','sB','select'],
    ['세대/실수','tU','sU','number'],
    ['사업방식','tP','sP','select'],
    ['층수','tF','sF','number'],
    ['대지㎡','tS','sS','number'],
    ['연면적㎡','tA','sA','number'],
  ];
  wrap.innerHTML=fields.map(([label,id,main,type])=>`
    <label class="tc-field">
      <span>${label}</span>
      ${type==='select'
        ? `<select id="${id}" data-main="${main}"></select>`
        : `<input id="${id}" data-main="${main}" type="number" min="1">`}
    </label>`).join('');
  wrap.querySelectorAll('[data-main]').forEach(el=>{
    const evt=el.tagName==='SELECT'?'change':'input';
    el.addEventListener(evt,function(){
      const main=document.getElementById(this.dataset.main);
      if(!main) return;
      main.value=this.value;
      main.dispatchEvent(new Event(main.tagName==='SELECT'?'change':'input',{bubbles:true}));
    });
  });
  wrap.dataset.ready='1';
}
function syncTopSelect(topId,mainId){
  const top=document.getElementById(topId);
  const main=document.getElementById(mainId);
  if(!top || !main) return;
  const html=[...main.options].map(o=>`<option value="${escHtml(o.value)}">${escHtml(o.textContent)}</option>`).join('');
  if(top.dataset.optionsHtml!==html){
    top.innerHTML=html;
    top.dataset.optionsHtml=html;
  }
  top.value=main.value;
}
function syncTopEditFromMain(){
  buildTopEditForm();
  [['tR','sR'],['tC','sC'],['tZ','sZ'],['tB','sB'],['tP','sP']].forEach(([t,m])=>syncTopSelect(t,m));
  [['tU','sU'],['tF','sF'],['tS','sS'],['tA','sA']].forEach(([t,m])=>{
    const top=document.getElementById(t);
    const main=document.getElementById(m);
    if(top && main && top.value!==main.value) top.value=main.value;
  });
}

/* ============ 계산기 2: 법정 주차대수 산출 ============ */
let pkRanges=[
  {lbl:'30㎡ 이하', units:0, area:0, small:true,  over85:false, rep:24},
  {lbl:'30㎡ ~ 60㎡', units:0, area:0, small:true,  over85:false, rep:48},
  {lbl:'60㎡ ~ 85㎡', units:0, area:0, small:false, over85:false, rep:74},
  {lbl:'85㎡ 초과', units:0, area:0, small:false, over85:true,  rep:108},
];
let pkPreset='local'; // local=조례/법정 자동, std=법정 강제

/* 주택건설기준 제27조①1 지역 분류 + 면적당 기준(1/N) */
const PARK_REGION={'서울특별시':'a','부산광역시':'b','대구광역시':'b','인천광역시':'b','광주광역시':'b','대전광역시':'b','울산광역시':'b','세종특별자치시':'b','경기도':'b','강원특별자치도':'c','충청북도':'c','충청남도':'c','전북특별자치도':'c','전라남도':'c','경상북도':'c','경상남도':'c','제주특별자치도':'c'};
const PARK_STD={a:[75,65],b:[85,70],c:[95,75],d:[110,85]};
const PARK_RGN_LABEL={a:'특별시(서울)',b:'광역시·특별자치시·수도권 내 시',c:'그 밖의 시·수도권 군',d:'그 밖의 지역(군)'};

/* 적용 규칙: 검증 조례(공동주택 강화) 우선, 없으면 법정 제27조 지역기준 */
function parkRule(I){
  const region = PARK_REGION[I.r]||'c';
  const rule = {region, std:PARK_STD[region].slice(), minSmall:0.7, minNormal:1.0, mult:1, minBand:null, verified:false,
    label:`주택건설기준 제27조 — ${PARK_RGN_LABEL[region]} (85㎡↓ 1/${PARK_STD[region][0]}·85㎡↑ 1/${PARK_STD[region][1]}, 세대당 최소 1대/60㎡↓ 0.7대)`};
  const ord=getCityOrd(I.r,I.c);
  if(ord && ord.data && ord.data.pkv && ord.data.pkrule){
    const r=ord.data.pkrule;
    rule.std = r.std?r.std.slice():rule.std;
    rule.minSmall = (r.minSmall!=null)?r.minSmall:rule.minSmall;
    rule.minNormal = (r.minNormal!=null)?r.minNormal:rule.minNormal;
    rule.mult = (r.mult!=null)?r.mult:1;
    rule.minBand = r.minBand?r.minBand.slice():null;
    rule.verified=true;
    rule.label=`✔ ${ord.data.note} 별표 검증 — 85㎡↓ 1/${rule.std[0]}·85㎡↑ 1/${rule.std[1]}, 세대당 최소 ${rule.minNormal}대(60㎡↓ ${rule.minSmall}대)${rule.mult>1?` ×${rule.mult}배 가중`:''} [${ord.data.pksrc||''}]`;
  }
  return rule;
}

function applyPkPreset(key){
  pkPreset=key; userTouched.pkRatios=true;
  document.querySelectorAll('.preset-btn[data-preset]').forEach(b=>b.classList.toggle('on',b.dataset.preset===key));
  renderParkCalc();
}

function renderParkCalc(){
  const I=getInputs();
  const auto=parkRule(I);
  const useStd=(pkPreset==='std');
  const std = useStd ? PARK_STD[PARK_REGION[I.r]||'c'] : auto.std;
  const minSmall = useStd ? 0.7 : auto.minSmall;
  const minNormal = useStd ? 1.0 : auto.minNormal;
  const mult = useStd ? 1 : (auto.mult||1);
  const minBand = useStd ? null : auto.minBand;
  const label = useStd ? `주택건설기준 제27조 — ${PARK_RGN_LABEL[PARK_REGION[I.r]||'c']} (법정 최소)` : auto.label;
  const verified = useStd ? false : auto.verified;

  // 세대수 기본 배분(미설정 시 60~85㎡에 일괄)
  if(pkRanges.reduce((s,r)=>s+r.units,0)===0){ pkRanges.forEach(r=>{r.units=0;r.area=0;}); pkRanges[2].units=I.u; }
  // 전용면적 미입력 시 구간 대표면적으로 추정
  pkRanges.forEach(r=>{ if(!r.area && r.units) r.area = Math.round(r.units*r.rep); });

  let areaPark=0,minPark=0,totalUnits=0,totalArea=0;
  pkRanges.forEach((r,idx)=>{
    const base=r.over85?std[1]:std[0];
    areaPark += (r.area||0)/base;
    const mb=(minBand&&minBand[idx]!=null)?minBand[idx]:(r.small?minSmall:minNormal);
    minPark += (r.units||0)*mb;
    totalUnits += (r.units||0); totalArea += (r.area||0);
  });
  let result=Math.max(areaPark,minPark);
  if(mult>1){ result=Math.max(result*mult, totalUnits); }
  const rounded=Math.ceil(result-1e-9);
  window.__pkResult=rounded;

  document.getElementById('pk-rows').innerHTML=pkRanges.map((r,i)=>{
    const base=r.over85?std[1]:std[0];
    return `<tr><td>${r.lbl}</td>
      <td style="text-align:right"><input type="number" class="tbl-input" data-pk-u="${i}" value="${r.units}" min="0"></td>
      <td style="text-align:right"><input type="number" class="tbl-input" data-pk-area="${i}" value="${r.area||0}" min="0" step="10"></td>
      <td style="text-align:right">${((r.area||0)/base).toFixed(1)}대</td></tr>`;
  }).join('')+
  `<tr class="tbl-sum"><td><b>합계</b></td><td style="text-align:right">${totalUnits.toLocaleString()}세대</td><td style="text-align:right">${totalArea.toLocaleString()}㎡</td><td style="text-align:right">${areaPark.toFixed(1)}대</td></tr>`;

  document.getElementById('pk-result').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px">
      <div><div class="sc-lbl">면적식 산정</div><div style="font-size:16px;font-weight:600;color:#1e293b">${areaPark.toFixed(1)}대</div></div>
      <div><div class="sc-lbl">세대당 최소</div><div style="font-size:16px;font-weight:600;color:#1e293b">${minPark.toFixed(1)}대</div></div>
      <div><div class="sc-lbl">법정 주차대수 (큰 값·올림)${mult>1?` ×${mult}배 가중`:''}</div><div style="font-size:22px;font-weight:700;color:#dc2626">${rounded}대</div></div>
    </div>
    <div style="font-size:11px;color:#64748b;margin-top:7px;padding-top:7px;border-top:1px solid #f1f5f9;line-height:1.65">
      ${totalUnits!==I.u?`<span style="color:#dc2626">⚠ 합산 세대수(${totalUnits})와 메인 세대수(${I.u}) 불일치</span><br>`:''}
      적용: <b>${label}</b> ${verified?'<span style="color:#16a34a">● 조례 별표 검증</span>':'<span style="color:#b45309">● 법정 기준(조례 강화분 elis 확인)</span>'}<br>
      산식: 면적식 Σ(구간 전용면적합계÷지역기준) · 세대당최소 Σ(세대수×최소대수) · <b>법정=둘 중 큰 값(올림)</b>. 전용면적 미입력 시 구간 대표면적으로 추정(직접 입력 권장). 주택 외 시설은 주차장법 시행령 별표1.
    </div>`;

  document.querySelectorAll('[data-pk-u]').forEach(el=>el.addEventListener('input',function(){const i=+this.dataset.pkU;pkRanges[i].units=Math.max(0,parseInt(this.value)||0);pkRanges[i].area=0;renderParkCalc();}));
  document.querySelectorAll('[data-pk-area]').forEach(el=>el.addEventListener('input',function(){const i=+this.dataset.pkArea;pkRanges[i].area=Math.max(0,parseFloat(this.value)||0);renderParkCalc();}));
}

/* ============ 계산기 3: 교통영향평가 ============ */
let trafficState={urban:'y'};

function renderTraffic(){
  const I=getInputs();
  document.getElementById('tf-units').textContent=I.u.toLocaleString();
  document.getElementById('tf-area').textContent=I.fa.toLocaleString();
  const isUrban=trafficState.urban==='y';
  const u=I.u,fa=I.fa;
  const ordRes=getCityOrd(I.r,I.c);
  const autoUrban = ordRes ? ordRes.data.urban : URBAN_DEFAULT_REGIONS.includes(I.r);
  let level='N', reasons=[];
  if(isUrban){
    if(u>=100){level='A';reasons.push(`도시교통정비지역 공동주택 <b>${u}세대 ≥ 100세대</b> — 교통영향평가 대상`);}
    else if(u>=50){level='V';reasons.push(`도시교통정비지역 <b>${u}세대</b> (50~99) — 간이평가 대상 검토`);}
    if(fa>=100000){if(level!=='A')level='A';reasons.push(`연면적 <b>${fa.toLocaleString()}㎡ ≥ 100,000㎡</b>`);}
    else if(fa>=50000&&level==='N'){level='V';reasons.push(`연면적 <b>${fa.toLocaleString()}㎡</b> (50,000㎡ 이상)`);}
  } else {
    if(u>=200){level='A';reasons.push(`비도시지역 공동주택 <b>${u}세대 ≥ 200세대</b>`);}
    else if(u>=100){level='V';reasons.push(`비도시지역 <b>${u}세대</b> — 지자체 별도 기준 확인`);}
  }
  if(reasons.length===0)reasons.push(`현재 규모(<b>${u}세대 / ${fa.toLocaleString()}㎡</b>)는 일반 기준상 대상 외 가능`);

  let title='',sub='';
  if(level==='A'){title='⚠ 교통영향평가 대상 가능성 높음';sub='지자체 교통과 사전 협의 → 평가서 작성 → 심의 → 사업계획승인';}
  else if(level==='V'){title='⚠ 확인 필요 — 평가 등급 검토';sub='지자체 교통과 사전 협의로 확정';}
  else{title='✓ 일반 기준상 대상 외 가능';sub='지자체 별도 기준 확인 권장';}

  const cityLabel = regionLabel(I);
  document.getElementById('tf-result').innerHTML=`<div class="judg-${level}">
    <div class="judg-t">${title}</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:6px">${sub}</div>
    ${!userTouched.trafficUrban?`<div style="font-size:10.5px;color:#16a34a;margin-bottom:5px">● ${cityLabel}는 ${autoUrban?'도시교통정비지역':'그 외 지역'}으로 자동 판정 (수동 변경 가능)</div>`:''}
    <div class="judg-r"><b>판정 근거:</b><ul>${reasons.map(rr=>`<li>${rr}</li>`).join('')}</ul></div>
    ${level!=='N'?`<div style="font-size:11px;color:#475569;margin-top:7px;padding-top:7px;border-top:1px solid rgba(0,0,0,.06);line-height:1.7"><b>절차:</b><br>1. 지자체 교통과 사전 협의<br>2. 교통영향평가 용역 발주 (전문기관)<br>3. 평가서 작성·제출<br>4. 교통영향평가심의위원회 심의<br>5. 사업계획승인 시 평가결과 반영</div>`:''}
  </div>`;
}

function topConsoleOffset(){
  const el=document.getElementById('topConsole');
  return el ? el.offsetHeight + 12 : 0;
}
let activePage='basic';
function showPage(page){
  const next=page||'basic';
  activePage=next;
  document.querySelectorAll('.page-panel').forEach(panel=>{
    panel.classList.toggle('on',panel.dataset.page===next);
  });
  updateActiveStepNav();
  window.scrollTo({top:0,behavior:'auto'});
}
function updateActiveStepNav(){
  const navs=[...document.querySelectorAll('.step-jump')];
  navs.forEach(btn=>btn.classList.toggle('on',btn.dataset.pageTarget===activePage));
}
let stepNavTick=false;
function scheduleStepNavUpdate(){
  if(stepNavTick) return;
  stepNavTick=true;
  requestAnimationFrame(()=>{stepNavTick=false;updateActiveStepNav();});
}

  // 사업방식별 인허가 타임라인 + 단계별 병행 심의·영향평가 태그(검증 엔진 c7/c10 대상 판정)

    var housingLaw=isHousing&&u>=30&&pt!=='gen';

    var planSide=c.filter(function(it){return (it.s==='A'||it.s==='V')&&!DIG.test(it.t);}).map(chip);

    if(!consSide.length) consSide=[{t:'굴토(흙막이) 심의',k:'ver'},{t:'지하안전 확인',k:'ver'}];

    var ux={lodge:'숙박업 신고',sales:'대규모점포 등록',welfare:'복지시설 설치신고',medical:'의료기관 개설신고',factory:'공장설립 승인',culture:'공연장 등록'};
    if(ux[use]) useTags=useTags.concat([{t:ux[use],k:'req'}]);
    var saleSide= pub?[]:[{t:'분양보증 (HUG)',k:'req'}];

        S('사업시행계획 인가','도정법 제50조','건축계획 확정 — 각종 영향평가·심의 병행',planSide),

      steps=[S('조합원 모집 신고·공개모집','주택법 제11조의3','대지 50%↑ 사용권원 확보 후 신고'),

    }else{route='일반 건축 (건축법) · '+(USE_L[use]||'');
      steps=[S('사전 기획·부지 검토','','용도지역·지구단위·건폐/용적·높이 사전검토',[{t:'지구단위계획 확인',k:'ver'},{t:'토지이용계획 확인',k:'ver'}]),

    }
